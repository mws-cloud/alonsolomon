<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פנייתך התקבלה | משרד עו״ד אלון סולומון ושות׳</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://a-solomon.com/program/thankyou/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root { --green: #0a4928; --gold: #e4bf03; --ink: #1d2b24; --muted: #5b6b62; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans Hebrew", Arial, sans-serif; color: var(--ink);
      background: #f6f8f6; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px; line-height: 1.7;
    }
    .card {
      background: #fff; border-radius: 20px; max-width: 520px; width: 100%;
      padding: 48px 34px; text-align: center; box-shadow: 0 12px 40px rgba(10,73,40,.12);
    }
    .check {
      width: 84px; height: 84px; margin: 0 auto 22px; border-radius: 50%;
      background: var(--green); display: flex; align-items: center; justify-content: center;
    }
    .check svg { width: 44px; height: 44px; stroke: var(--gold); stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h1 { color: var(--green); font-size: 1.7rem; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 1.05rem; margin-bottom: 10px; }
    .sub { font-size: .95rem; }
    .actions { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: block; padding: 14px 20px; border-radius: 12px; font-weight: 800;
      font-size: 1rem; text-decoration: none; transition: opacity .2s;
    }
    .btn:hover { opacity: .9; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-ghost { background: transparent; color: var(--green); border: 1.5px solid var(--green); }
    .foot { margin-top: 26px; font-size: .85rem; color: var(--muted); }
  </style>
  <script src="https://cdn.enable.co.il/licenses/enable-L9081i6xrkn14tg-0721-82110/init.js" defer></script>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
    </div>
    <h1>פנייתך התקבלה</h1>
    <p>תודה שפנית למשרד עו״ד אלון סולומון ושות׳.</p>
    <p class="sub">קיבלנו את הפרטים שלך וניצור איתך קשר בהקדם לבדיקת ההתאמה והזכאות לתכנית.</p>
    <div class="actions">
      <a class="btn btn-primary" href="tel:077-5255923">חייגו אלינו: 077-5255923</a>
      <a class="btn btn-ghost" href="../">חזרה לדף התכנית</a>
    </div>
    <div class="foot">משרד עו״ד אלון סולומון ושות׳ · a-solomon.com</div>
  </main>
</body>
</html>
